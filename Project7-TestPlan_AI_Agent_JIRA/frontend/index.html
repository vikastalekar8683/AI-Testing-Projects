<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Intelligent Test Plan Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      margin: 0;
    }

    /* Micro-animations */
    .fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Basic SVG Icons
    const IconDashboard = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1" /><rect width="7" height="5" x="14" y="3" rx="1" /><rect width="7" height="9" x="14" y="12" rx="1" /><rect width="7" height="5" x="3" y="16" rx="1" /></svg>;
    const IconFileText = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /></svg>;
    const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></svg>;

    const API_BASE = "http://127.0.0.1:8000";

    function App() {
      const [activeTab, setActiveTab] = useState('generator');
      const [llmType, setLlmType] = useState(localStorage.getItem('ai_plan_llm_type') || 'local');
      const [modelName, setModelName] = useState(localStorage.getItem('ai_plan_model_name') || 'qwen3:4b');

      const [issueId, setIssueId] = useState(localStorage.getItem('ai_plan_issue_id') || 'PROJ-101');

      const [plansGenerated, setPlansGenerated] = useState(parseInt(localStorage.getItem('ai_plans_count') || '0'));
      const [issuesFetched, setIssuesFetched] = useState(parseInt(localStorage.getItem('ai_issues_count') || '0'));

      // Persist Settings
      useEffect(() => {
        localStorage.setItem('ai_plan_llm_type', llmType);
      }, [llmType]);

      useEffect(() => {
        localStorage.setItem('ai_plans_count', plansGenerated);
      }, [plansGenerated]);

      useEffect(() => {
        localStorage.setItem('ai_issues_count', issuesFetched);
      }, [issuesFetched]);

      useEffect(() => {
        localStorage.setItem('ai_plan_model_name', modelName);
      }, [modelName]);

      useEffect(() => {
        localStorage.setItem('ai_plan_issue_id', issueId);
      }, [issueId]);

      const [fetchedData, setFetchedData] = useState(null);
      const [isFetching, setIsFetching] = useState(false);
      const [fetchError, setFetchError] = useState('');

      const [isGenerating, setIsGenerating] = useState(false);
      const [generatedPlan, setGeneratedPlan] = useState(null);
      const [genError, setGenError] = useState('');

      const [isTestingJira, setIsTestingJira] = useState(false);
      const [jiraTestStatus, setJiraTestStatus] = useState(null);

      const handleFetchIssue = async () => {
        if (!issueId) return;
        setIsFetching(true);
        setFetchError('');
        setFetchedData(null);
        setGeneratedPlan(null);
        try {
          const res = await fetch(`${API_BASE}/api/jira/fetch`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ issue_id: issueId })
          });
          const json = await res.json();
          if (!res.ok) throw new Error(json.detail || 'Failed to fetch Jira issue');
          setFetchedData(json.data);
          setIssuesFetched(prev => prev + 1);
        } catch (err) {
          setFetchError(err.message);
        } finally {
          setIsFetching(false);
        }
      };

      const handleTestJira = async () => {
        setIsTestingJira(true);
        setJiraTestStatus(null);
        try {
          const res = await fetch(`${API_BASE}/api/jira/test`);
          const json = await res.json();
          if (!res.ok) throw new Error(json.detail || 'Connection failed');
          setJiraTestStatus({ success: true, message: typeof json.message === "string" ? json.message : JSON.stringify(json.message) });
        } catch (err) {
          setJiraTestStatus({ success: false, message: err.message });
        } finally {
          setIsTestingJira(false);
        }
      };

      const handleGeneratePlan = async () => {
        if (!fetchedData) return;
        setIsGenerating(true);
        setGenError('');
        try {
          const res = await fetch(`${API_BASE}/api/generate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              issue_payload: fetchedData,
              llm_type: llmType,
              model_name: modelName
            })
          });
          const json = await res.json();
          if (!res.ok) throw new Error(json.detail || 'Failed to generate plan');
          setGeneratedPlan(json.data);
          setPlansGenerated(prev => prev + 1);
        } catch (err) {
          setGenError(err.message);
        } finally {
          setIsGenerating(false);
        }
      };

      return (
        <div className="flex h-screen w-full text-slate-900 font-sans">
          {/* Sidebar */}
          <div className="w-64 bg-slate-900 text-slate-100 flex flex-col p-4 shadow-xl z-20">
            <div className="flex items-center gap-3 mb-10 px-2 py-3 border-b border-slate-700">
              <div className="text-blue-400 font-bold text-2xl">⚡</div>
              <h1 className="text-xl font-bold tracking-tight">AI Test Plan</h1>
            </div>

            <nav className="flex-1 space-y-2">
              <button onClick={() => setActiveTab('dashboard')} className={`flex items-center gap-3 w-full px-4 py-3 rounded-lg transition-colors ${activeTab === 'dashboard' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}>
                <IconDashboard /> Dashboard
              </button>
              <button onClick={() => setActiveTab('generator')} className={`flex items-center gap-3 w-full px-4 py-3 rounded-lg transition-colors ${activeTab === 'generator' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}>
                <IconFileText /> Generate Plan
              </button>
              <button onClick={() => setActiveTab('settings')} className={`flex items-center gap-3 w-full px-4 py-3 rounded-lg transition-colors ${activeTab === 'settings' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800'}`}>
                <IconSettings /> Settings
              </button>
            </nav>
          </div>

          {/* Main Content */}
          <div className="flex-1 overflow-auto flex flex-col bg-slate-50 relative">
            <header className="bg-white border-b border-slate-200 h-16 flex items-center px-8 justify-between sticky top-0 z-10 shadow-sm">
              <h2 className="text-xl font-semibold capitalize text-slate-700">{activeTab.replace('-', ' ')}</h2>
              <div className="flex items-center gap-3">
                <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold shadow-md">V</div>
              </div>
            </header>

            <main className="flex-1 p-8">

              {/* DASHBOARD TAB */}
              {activeTab === 'dashboard' && (
                <div className="space-y-6 fade-in">
                  <div className="grid grid-cols-3 gap-6">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 transition-all hover:shadow-md">
                      <h3 className="text-sm font-medium text-slate-500">Plans Generated</h3>
                      <p className="text-3xl font-bold mt-2 text-slate-800">{plansGenerated}</p>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 transition-all hover:shadow-md">
                      <h3 className="text-sm font-medium text-slate-500">Issues Fetched</h3>
                      <p className="text-3xl font-bold mt-2 text-slate-800">{issuesFetched}</p>
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 transition-all hover:shadow-md">
                      <h3 className="text-sm font-medium text-slate-500">API Status</h3>
                      <p className="text-lg font-bold mt-2 text-emerald-600 flex items-center gap-2">
                        <span className="w-2 h-2 rounded-full bg-emerald-500"></span> Online
                      </p>
                    </div>
                  </div>
                </div>
              )}

              {/* GENERATOR TAB */}
              {activeTab === 'generator' && (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-8 max-w-4xl mx-auto fade-in">
                  <h3 className="text-2xl font-bold mb-6 text-slate-800 border-b border-slate-100 pb-4">Generate Test Plan</h3>
                  <div className="space-y-6">
                    <div>
                      <label className="block text-sm font-semibold text-slate-700 mb-2">Jira Issue ID</label>
                      <div className="flex gap-4">
                        <input
                          type="text"
                          value={issueId}
                          onChange={(e) => setIssueId(e.target.value)}
                          placeholder="e.g. PROJ-101"
                          className="flex-1 border border-slate-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow"
                        />
                        <button
                          onClick={handleFetchIssue}
                          disabled={isFetching}
                          className="bg-slate-800 hover:bg-slate-900 text-white px-6 py-3 rounded-lg font-medium transition-colors shadow-sm disabled:opacity-50"
                        >
                          {isFetching ? 'Fetching...' : 'Fetch Issue'}
                        </button>
                      </div>
                      {fetchError && <p className="text-red-500 mt-2 text-sm font-medium">{fetchError}</p>}
                    </div>

                    {fetchedData ? (
                      <div className="border border-emerald-100 rounded-lg p-6 bg-emerald-50/50 flex flex-col fade-in shadow-inner">
                        <span className="text-xs font-bold tracking-wider text-emerald-600 uppercase mb-2">✓ Successfully Fetched Payload</span>
                        <h4 className="font-bold text-lg text-slate-900">{fetchedData.issue_id}: {fetchedData.title}</h4>
                        <p className="text-slate-600 mt-2 text-sm line-clamp-3">{fetchedData.description || 'No description provided.'}</p>
                        <div className="flex gap-2 mt-4">
                          <span className="px-2 py-1 bg-white border border-slate-200 rounded text-xs font-medium">{fetchedData.issue_type}</span>
                          <span className="px-2 py-1 bg-white border border-slate-200 rounded text-xs font-medium">{fetchedData.priority}</span>
                        </div>
                      </div>
                    ) : (
                      <div className="border border-slate-200 rounded-lg p-6 bg-slate-50 flex flex-col items-center justify-center text-slate-500 min-h-[150px] border-dashed">
                        <p>Enter an Issue ID and click "Fetch Issue" to preview details</p>
                      </div>
                    )}

                    <button
                      onClick={handleGeneratePlan}
                      disabled={!fetchedData || isGenerating}
                      className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white py-4 rounded-lg font-bold text-lg transition-colors shadow-md shadow-blue-200 flex items-center justify-center gap-2"
                    >
                      {isGenerating ? (
                        <span className="flex items-center gap-2">
                          <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                          Generating Test Plan with AI...
                        </span>
                      ) : 'Generate Test Plan'}
                    </button>
                    {genError && <p className="text-red-500 mt-2 text-sm font-medium">{genError}</p>}

                    {/* RENDER PLAN */}
                    {generatedPlan && (
                      <div className="border border-blue-200 bg-white rounded-xl shadow-lg mt-8 p-8 fade-in text-sm">
                        <div className="flex justify-between items-center border-b pb-4 mb-4">
                          <h4 className="font-bold text-xl text-slate-800">AI Generated Detailed Test Plan</h4>
                          <button className="text-blue-600 hover:text-blue-800 font-medium">Export to PDF</button>
                        </div>
                        <div className="space-y-6 mt-6">
                          <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                            <strong className="text-slate-700 block mb-1 uppercase text-xs tracking-wider">Test Objectives</strong>
                            <p className="text-slate-600 leading-relaxed">{generatedPlan.test_objectives}</p>
                          </div>

                          <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                            <strong className="text-slate-700 block mb-1 uppercase text-xs tracking-wider">Scope</strong>
                            <p className="text-slate-600 leading-relaxed">{generatedPlan.scope}</p>
                          </div>

                          <div className="space-y-4">
                            <h5 className="font-bold text-slate-800 text-lg flex items-center gap-2">
                              <span className="w-2 h-6 bg-blue-600 rounded-full"></span>
                              Detailed Test Cases
                            </h5>
                            {(generatedPlan.detailed_test_cases || []).map((tc, i) => (
                              <div key={i} className="border border-slate-200 rounded-xl overflow-hidden bg-white shadow-sm hover:shadow-md transition-shadow">
                                <div className="bg-slate-800 text-white px-4 py-2 flex justify-between items-center text-xs">
                                  <span className="font-mono">{tc.id || `TC-${i + 1}`}</span>
                                  <span className={`px-2 py-0.5 rounded font-bold uppercase ${tc.priority === 'High' ? 'bg-red-500' : tc.priority === 'Medium' ? 'bg-amber-500' : 'bg-emerald-500'}`}>
                                    {tc.priority}
                                  </span>
                                </div>
                                <div className="p-4 space-y-3">
                                  <h6 className="font-bold text-slate-900 text-base">{tc.title}</h6>
                                  {tc.preconditions && (
                                    <div className="text-xs bg-slate-50 p-2 rounded italic text-slate-500 border-l-2 border-slate-300">
                                      Pre: {tc.preconditions}
                                    </div>
                                  )}
                                  <div>
                                    <span className="text-xs font-bold text-slate-500 uppercase block mb-1">Steps:</span>
                                    <ol className="list-decimal pl-5 text-sm text-slate-700 space-y-1">
                                      {(tc.steps || []).map((step, si) => <li key={si}>{step}</li>)}
                                    </ol>
                                  </div>
                                  <div className="pt-2 border-t border-slate-100">
                                    <span className="text-xs font-bold text-emerald-600 uppercase block mb-1">Expected Result:</span>
                                    <p className="text-sm text-slate-700 font-medium">{tc.expected_result}</p>
                                  </div>
                                </div>
                              </div>
                            ))}
                          </div>

                          <div className="grid grid-cols-2 gap-4 mt-6">
                            <div className="bg-indigo-50/50 p-4 rounded-lg border border-indigo-100">
                              <strong className="text-indigo-900 block mb-2 text-sm uppercase tracking-wider">Non-Functional</strong>
                              <ul className="list-disc pl-5 text-sm text-slate-600 space-y-1">
                                {(generatedPlan.non_functional_scenarios || []).map((s, i) => <li key={i}>{s}</li>)}
                              </ul>
                            </div>
                            <div className="bg-blue-50/50 p-4 rounded-lg border border-blue-100">
                              <strong className="text-blue-900 block mb-2 text-sm uppercase tracking-wider">API Scenarios</strong>
                              <ul className="list-disc pl-5 text-sm text-slate-600 space-y-1">
                                {(generatedPlan.api_test_scenarios || []).map((s, i) => <li key={i}>{s}</li>)}
                              </ul>
                            </div>
                          </div>

                          <div className="bg-red-50/50 p-4 rounded-lg border border-red-100">
                            <strong className="text-red-900 block mb-1">Risk Analysis:</strong>
                            <p className="text-sm text-slate-600">{generatedPlan.risk_analysis}</p>
                          </div>

                          <div className="flex gap-4">
                            <div className="flex-1 bg-emerald-50/50 p-4 rounded-lg border border-emerald-100">
                              <strong className="text-emerald-900 block mb-1 text-sm uppercase">Entry Criteria</strong>
                              <p className="text-sm text-slate-600">{generatedPlan.entry_criteria}</p>
                            </div>
                            <div className="flex-1 bg-slate-50 p-4 rounded-lg border border-slate-200">
                              <strong className="text-slate-900 block mb-1 text-sm uppercase">Exit Criteria</strong>
                              <p className="text-sm text-slate-600">{generatedPlan.exit_criteria}</p>
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* SETTINGS TAB */}
              {activeTab === 'settings' && (
                <div className="max-w-4xl mx-auto space-y-6 fade-in">
                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
                    <h3 className="text-xl font-bold mb-6 border-b pb-4 text-slate-800">Jira Configuration</h3>
                    <p className="text-sm text-slate-500 mb-4">These credentials are securely managed by the `.env` backend variables.</p>
                    <div className="space-y-4 opacity-75 pointer-events-none">
                      <div>
                        <label className="block text-sm font-semibold text-slate-700 mb-1">Jira Base URL</label>
                        <input type="text" value="https://vikasbugzz.atlassian.net" className="w-full border border-slate-300 rounded-lg px-4 py-2 bg-slate-100" />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold text-slate-700 mb-1">Jira Email</label>
                        <input type="email" value="vikastalekar8683@gmail.com" className="w-full border border-slate-300 rounded-lg px-4 py-2 bg-slate-100" />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold text-slate-700 mb-1">Jira API Token</label>
                        <input type="password" value="••••••••••••••••" className="w-full border border-slate-300 rounded-lg px-4 py-2 bg-slate-100" />
                      </div>
                    </div>

                    <div className="mt-6 pt-6 border-t border-slate-100">
                      <button
                        onClick={handleTestJira}
                        disabled={isTestingJira}
                        className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors shadow-sm flex items-center gap-2 disabled:opacity-50"
                      >
                        {isTestingJira ? (
                          <>
                            <svg className="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            Testing...
                          </>
                        ) : 'Test Connection'}
                      </button>

                      {jiraTestStatus && (
                        <div className={`mt-4 p-4 rounded-lg border flex items-start gap-3 fade-in ${jiraTestStatus.success ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'}`}>
                          {jiraTestStatus.success ? (
                            <svg className="w-5 h-5 mt-0.5 flex-shrink-0 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                          ) : (
                            <svg className="w-5 h-5 mt-0.5 flex-shrink-0 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                          )}
                          <div>
                            <div className="font-semibold text-sm">
                              {jiraTestStatus.success ? 'Connection Successful' : 'Connection Failed'}
                            </div>
                            <p className="mt-1 text-sm opacity-90 font-mono text-xs break-all">
                              {jiraTestStatus.message}
                            </p>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>

                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
                    <h3 className="text-xl font-bold mb-6 border-b pb-4 text-slate-800">LLM Configuration</h3>
                    <div className="space-y-4">
                      <div className="flex gap-4 mb-4">
                        <label className="flex items-center gap-2 cursor-pointer bg-slate-50 border border-slate-200 px-4 py-2 rounded-lg hover:bg-slate-100 w-1/2">
                          <input type="radio" name="llm_type" checked={llmType === 'local'} onChange={() => setLlmType('local')} />
                          <span className="font-semibold text-slate-800">Local (Ollama / Open Source)</span>
                        </label>
                        <label className="flex items-center gap-2 cursor-pointer bg-slate-50 border border-slate-200 px-4 py-2 rounded-lg hover:bg-slate-100 w-1/2">
                          <input type="radio" name="llm_type" checked={llmType === 'cloud'} onChange={() => { setLlmType('cloud'); setModelName('openai:gpt-4o'); }} />
                          <span className="font-semibold text-slate-800">Cloud (OpenAI / Groq)</span>
                        </label>
                      </div>

                      {llmType === 'local' && (
                        <div className="bg-indigo-50 border border-indigo-200 p-5 rounded-lg mb-4 shadow-inner">
                          <div className="flex items-start gap-3">
                            <span className="text-xl">🌟</span>
                            <div className="w-full">
                              <p className="text-sm text-indigo-900 mb-3 font-medium">We support running large open-source models completely offline.</p>

                              <label className="block text-sm font-bold text-slate-800 mb-2">Select Free Local Model</label>
                              <select
                                value={modelName}
                                onChange={(e) => setModelName(e.target.value)}
                                className="w-full border border-indigo-200 rounded-lg px-4 py-3 mb-4 bg-white shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none"
                              >
                                <option value="qwen3:4b">🌟 Qwen 3 (4B) - Available Local</option>
                                <option value="gemma3:4b">Gemma 3 (4B) - Available Local</option>
                                <option value="qwen3-coder:480b-cloud">Qwen 3 Coder (480B Cloud/Proxy)</option>
                                <option value="llama3:latest">Llama 3 (Meta) - Pull Required</option>
                                <option value="mistral:latest">Mistral - Pull Required</option>
                              </select>

                              <label className="block text-sm font-bold text-slate-800 mb-1">Ollama API URL</label>
                              <input type="text" readOnly value="http://localhost:11434" className="w-full border border-indigo-200 rounded-lg px-4 py-2 bg-indigo-100 text-slate-600" />
                            </div>
                          </div>
                        </div>
                      )}

                      {llmType === 'cloud' && (
                        <div className="bg-blue-50 border border-blue-200 p-5 rounded-lg mb-4 shadow-inner">
                          <div className="flex items-start gap-3">
                            <span className="text-xl">☁️</span>
                            <div className="w-full">
                              <p className="text-sm text-blue-900 mb-3 font-medium">Use high-performance cloud models like GPT-4o or Groq.</p>

                              <label className="block text-sm font-bold text-slate-800 mb-2">Select Cloud Model</label>
                              <select
                                value={modelName}
                                onChange={(e) => setModelName(e.target.value)}
                                className="w-full border border-blue-200 rounded-lg px-4 py-3 mb-4 bg-white shadow-sm focus:ring-2 focus:ring-blue-500 outline-none"
                              >
                                <optgroup label="OpenAI">
                                  <option value="openai:gpt-4o">GPT-4o (Standard)</option>
                                  <option value="openai:gpt-4o-mini">GPT-4o Mini (Fast)</option>
                                </optgroup>
                                <optgroup label="Groq">
                                  <option value="groq:llama-3.3-70b-versatile">Llama 3.3 70B (Versatile)</option>
                                  <option value="groq:llama-3.1-8b-instant">Llama 3.1 8B (Instant)</option>
                                  <option value="groq:mixtral-8x7b-32768">Mixtral 8x7B</option>
                                </optgroup>
                              </select>

                              <label className="block text-sm font-bold text-slate-800 mb-1">API Key Status</label>
                              <p className="text-xs text-slate-500 mb-2">Configure `OPENAI_API_KEY` or `GROQ_API_KEY` in your `.env` file.</p>
                              <input type="password" readOnly value="••••••••••••••••" className="w-full border border-blue-200 rounded-lg px-4 py-2 bg-blue-100 text-slate-600" />
                            </div>
                          </div>
                        </div>
                      )}

                    </div>
                  </div>
                </div>
              )
              }
            </main >
          </div >
        </div >
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
